<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Моя вторая страница</title>
    <style>
        body {
            background-color: #f9f9f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 30px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            color: #2c3e50;
            border-left: 5px solid #3498db;
            padding-left: 15px;
        }
        ul {
            background-color: #ecf0f1;
            padding: 15px 15px 15px 35px;
            border-radius: 8px;
            list-style-type: square;
        }
        li {
            margin: 8px 0;
            color: #2c3e50;
            font-size: 18px;
        }
        p {
            margin-top: 20px;
            font-size: 16px;
        }
        a {
            color: #e74c3c;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px dashed #e74c3c;
        }
        a:hover {
            color: #c0392b;
            border-bottom: 1px solid #c0392b;
        }
    </style>
</head>
<body>
    <h2>Список дел</h2>
    <ul>
        <li>Изучить HTML</li>
        <li>Написать код</li>
        <li>Отдохнуть</li>
    </ul>
    <p>Больше информации на <a href="https://example.com">сайте</a>.</p>
</body>
